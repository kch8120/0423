<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1202권채혁</title>
    <style>
        div{
            background-color: burlywood;
            background-size: 200px 200px;
            width: 300px;
            height: 300px;
            background-image: url("https://www.placecats.com/200/200");
            background-repeat: repeat-x;
            background-position: right center;
            box-shadow: 30px 30px violet;
            border: 5px solid orange;
        }
        p{
            text-shadow: 0 0 4px mediumpurple;
            color: white;
            font-size: 32px;
        }
        header{
            text-align: center;
        }
        span{
            background-color: pink;
        }
        footer{
            background-color: pink;
            text-align: center;
        }
    </style>
</head>
<body>
    <header><h3><span>이미지에 효과 적용하기</span></h3></header>
    <section>
        <hr>
        <article>
            <div>
                배경
            </div><br><br>
            <p>GSM Highschool</p>
        </article>
    </section>
    <footer>&copy;gsm hs 2025 sep</footer>
</body>
</html>
