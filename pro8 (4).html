<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1202권채혁</title>
    <style>
        img{
            width: 300px;
            height: 150px;
        }
        .left{
            box-shadow: 5px 5px black;
        }
        .mid{
            box-shadow: 5px 5px skyblue;
        }
        .right{
            box-shadow: 5px 5px yellowgreen;
        }
        h3{
            background-color: skyblue;
            color: yellowgreen;
            text-align: center;
        }
        hr{
            border: 5px solid yellowgreen;
        }
    </style>
</head>

<body>
    <header>
        <h3>
            GSM 사진첩
        </h3>
    </header>
    <section>
        <hr>
        <article>
            <table>
                <tr>
                    <td class="left">
                        <img src="GSM로고.png">
                    </td>
                    <td class="mid">
                        <img src="7장게임.jpg">
                    </td>
                    <td class="right">
                        <img src="7장하이킹.jpg">
                    </td>
                </tr>
                <tr>
                    <td class="left">
                        <img src="7장골프.png">
                    </td>
                    <td class="mid">
                        <img src="https://www.placecats.com/600/300"
                        style="cursor: progress;">
                    </td>
                    <td class="right">
                        <img src="icecream.png">
                    </td>
                </tr>
            </table>
        </article>
    </section>
</body>

</html>
