<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1202권채혁</title>
    <style>
        span{
            background-color: mediumpurple;
        }
        h3{
            text-align: center;
        }
        footer{
            text-align: center;
        }
        hr{
            border: 5px dashed mediumpurple;
        }
    </style>
</head>

<body>
    <header><h3><span>회원 가입 화면</span></h3></header>
    <section>
        <article>
            <hr>
            <form>
                <fieldset>
                    <legend>기본 정보</legend>
                    아이디 : <input type="text"><br>
                    패스워드 : <input type="password" maxlength="10""><br>
                    이름 : <input type=" text"><br>
                    생년월일 : <input type="date"><br>
                    이메일 주소 : <input type="email" placeholder="id@host"><br>
                    주소 : <select>
                        <option value="1">서울특별시</option>
                        <option value="2">광주광역시</option>
                        <option value="3">인천광역시</option>
                    </select>
                </fieldset>
                <fieldset>
                    <legend>취미</legend>
                    <label>
                        <input type="radio" name="hobby" value="1">게임
                        <img src="7장게임.jpg" height="250px">
                    </label>

                    <label>
                        <input type="radio" name="hobby" value="1">하이킹
                        <img src="7장하이킹.jpg" height="250px">                        
                    </label>

                    <label>
                        <input type="radio" name="hobby" value="1">골프
                        <img src="7장골프.png" height="250px">
                    </label>
                    

                    <br>
                </fieldset>
                <input type="submit" value="가입">
                <input type="reset" value="취소">
                <br>
            </form>
        </article>
    </section>
    <footer>
        <span>&copy;gsm hs 2025 sep</span>
    </footer>
</body>

</html>
